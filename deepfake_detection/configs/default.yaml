# Centralized Configuration for TALL-Swin Deepfake Detection (RTX 4090 Optimized)

common:
  device: "cuda"
  num_workers: 8     # Increased for faster data loading
  seed: 42

paths:
  dataset_root: "deepfake_detection/data/raw/FaceForensics++_C23"
  manifest_path: "deepfake_detection/data/processed/dataset_manifest.json"
  output_dir: "deepfake_detection/data/processed"
  checkpoint_dir: "checkpoints"

preprocessing:
  target_fps: 10
  face_size: [224, 224]
  limit_videos: -1   # Process all available

model:
  type: "tall_swin_base"
  num_classes: 2
  n_segment: 16      # Full temporal resolution for Swin-B
  img_size: 224
  pretrained: true

meta_learning:
  n_way: 5           # Standard 5-way benchmark
  k_shot: 5          # 5-shot learning for better stability
  q_query: 15
  iterations: 500    # Increased for thorough training
  eval_iterations: 100 

training:
  batch_size: 1      # 1 full episode per GPU step (100 samples)
  epochs: 200        # Increased for thorough training
  lr: 0.00002        # Lowered for more stable fine-tuning of Swin-B
  gamma: 0.5
  step_size: 30      # Longer intervals for learning rate decay
